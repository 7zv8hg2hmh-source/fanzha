<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">

<title>上当模拟器 · 你能带着多少钱离场？</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="./config.js"></script>
<style>
  :root{
    --gold:#f5c542; --gold-d:#b8860b; --neon:#00ffd5;
    --red:#ef4444; --red-d:#7f1d1d;
    --bg:#0a0a0a; --bg2:#15110b;
    --font-display:"Oswald","Arial Black",sans-serif;
  }
  *{ -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#000; color:#fff; overscroll-behavior:none;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; }
  .font-mono{ font-family:"SF Mono","Menlo",monospace; font-variant-numeric:tabular-nums; }
  .font-display{ font-family:var(--font-display); letter-spacing:.02em; }
  /* 黑金赛博背景 */
  .arcade-bg{
    background:
      radial-gradient(circle at 20% 0%, rgba(245,197,66,.12), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(239,68,68,.12), transparent 50%),
      linear-gradient(180deg,#0a0a0a 0%,#15110b 60%,#0a0a0a 100%);
    min-height:100vh; min-height:100dvh;
  }
  .neon-text{ color:var(--gold); text-shadow:0 0 6px rgba(245,197,66,.6),0 0 12px rgba(245,197,66,.35); }
  .red-text{ color:#fca5a5; text-shadow:0 0 6px rgba(239,68,68,.6); }
  .gold-border{ border:1px solid rgba(245,197,66,.3); box-shadow:0 0 16px rgba(245,197,66,.08) inset; }
  /* 强刺激按钮 */
  .btn-pop{
    background:linear-gradient(180deg,#ffd54a 0%,#e0a008 100%);
    color:#1a1100; font-weight:900; border-radius:14px;
    box-shadow:0 8px 18px rgba(245,197,66,.24), inset 0 -1px 0 rgba(122,83,0,.45), inset 0 1px 0 rgba(255,255,255,.35);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .btn-pop:active{ transform:translateY(2px); box-shadow:0 4px 10px rgba(245,197,66,.2), inset 0 1px 2px rgba(122,83,0,.45); }
  .btn-red{
    background:linear-gradient(180deg,#ff5e5e,#b91c1c);
    color:#fff; font-weight:900; border-radius:14px;
    box-shadow:0 8px 0 #5c0d0d, 0 12px 24px rgba(239,68,68,.35);
  }
  .btn-red:active{ transform:translateY(4px); box-shadow:0 4px 0 #5c0d0d, 0 6px 14px rgba(239,68,68,.3); }
  .btn-ghost{
    background:transparent; border:1.5px solid rgba(255,255,255,.18); color:rgba(255,255,255,.7);
    border-radius:14px; font-weight:600; cursor:pointer; font-size:14px;
  }
  .btn-ghost:active{ background:rgba(255,255,255,.05); }
  .image-render-pixelated{ image-rendering:pixelated; }
  /* 数字跳动 */
  @keyframes pop { 0%{transform:scale(.7);opacity:0;} 60%{transform:scale(1.2);} 100%{transform:scale(1);opacity:1;} }
  .num-pop{ animation:pop .35s ease-out both; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-4px);} 40%{transform:translateX(5px);} 60%{transform:translateX(-3px);} 80%{transform:translateX(3px);} }
  .shake{ animation:shake .4s; }
  @keyframes glow { 0%,100%{box-shadow:0 0 12px rgba(245,197,66,.4);} 50%{box-shadow:0 0 24px rgba(245,197,66,.85);} }
  .glow{ animation:glow 1.6s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .blink{ animation:blink 1s ease-in-out infinite; }
  /* 转盘 */
  .wheel-shell{
    width:270px; height:270px; margin:0 auto; position:relative; border-radius:999px;
    padding:12px; background:linear-gradient(145deg,#ff3b22 0%,#ff1f16 42%,#c90f0f 100%);
    box-shadow:0 0 0 5px rgba(255,255,255,.16), 0 18px 36px rgba(255,39,20,.25), 0 18px 34px rgba(0,0,0,.36);
  }
  .wheel-shell::before{
    content:''; position:absolute; inset:-22px; border-radius:42px; z-index:-1;
    background:linear-gradient(180deg,#ff4529,#fb8a45);
    box-shadow:inset 0 0 42px rgba(255,255,255,.18);
  }
  .wheel-shell::after{
    content:''; position:absolute; inset:19px; border-radius:999px; pointer-events:none; z-index:3;
    border:2px solid rgba(255,255,255,.58);
    box-shadow:inset 0 0 0 3px rgba(255,221,150,.55);
  }
  .wheel{
    position:absolute; inset:12px; border-radius:999px; overflow:hidden;
    transition:transform 1.7s cubic-bezier(.12,.72,.08,1);
    box-shadow:inset 0 0 0 7px #fff2d2, inset 0 0 0 9px #e8b985, inset 0 0 24px rgba(106,52,15,.28);
  }
  .wheel::after{
    content:''; position:absolute; inset:0; border-radius:999px; pointer-events:none;
    background:repeating-conic-gradient(from -90deg, rgba(255,255,255,.72) 0deg 1.2deg, transparent 1.2deg 45deg);
  }
  .wheel-label{
    position:absolute; left:50%; top:50%; width:76px; height:48px; margin:-24px 0 0 -38px;
    transform:rotate(var(--a)) translateY(-94px);
    display:flex; align-items:center; justify-content:center; pointer-events:none;
    transform-origin:center center;
  }
  .wheel-label span{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    color:#8b4d22; font-size:11px; font-weight:900; line-height:1.05; white-space:nowrap;
    text-shadow:0 1px 0 rgba(255,255,255,.85);
  }
  .wheel-label b{
    min-width:30px; height:21px; padding:0 6px; border-radius:999px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#fff7df,#ffd57a);
    color:#e23b16; font-size:12px; box-shadow:0 2px 0 rgba(123,61,16,.18);
  }
  .wheel-label em{
    font-style:normal; letter-spacing:0; max-width:66px; overflow:hidden; text-overflow:ellipsis;
  }
  .wheel-center{
    position:absolute; inset:89px 61px 62px; border-radius:22px; z-index:4;
    background:linear-gradient(180deg,#fffdf4 0%,#ffe2b6 100%);
    border:3px solid #fff3ce;
    box-shadow:0 8px 0 #d96b21, 0 14px 22px rgba(105,45,0,.32), inset 0 2px 0 rgba(255,255,255,.8);
  }
  .wheel-pointer{
    position:absolute; top:54px; left:50%; transform:translateX(-50%); z-index:6;
    width:32px; height:26px; filter:drop-shadow(0 4px 5px rgba(104,60,20,.35));
  }
  .wheel-pointer::before{
    content:''; position:absolute; left:50%; top:0; transform:translateX(-50%);
    width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent; border-bottom:24px solid #53b8ff;
  }
  .wheel-pointer::after{
    content:''; position:absolute; left:50%; top:8px; transform:translateX(-50%);
    width:10px; height:10px; border-radius:999px; background:#fff; opacity:.8;
  }
  .wheel-draw-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:4px;
    margin-bottom:2px; padding:6px 17px; border-radius:999px;
    background:linear-gradient(180deg,#ffb356,#ff7a1f);
    color:#fff; font-weight:900; font-size:17px; line-height:1;
    border:2px solid rgba(255,255,255,.72);
    text-shadow:0 2px 0 rgba(151,54,0,.4);
    box-shadow:0 4px 0 #b84a0a, 0 8px 14px rgba(151,54,0,.28);
  }
  .wheel-luck{
    display:inline-flex; align-items:center; gap:4px; margin-top:3px; padding:3px 8px;
    border-radius:999px; background:linear-gradient(180deg,#8a35ff,#6d1de0);
    color:#fff; font-weight:900; font-size:10px; box-shadow:0 4px 0 #4c139c;
  }
  .wheel-pool{
    display:flex; align-items:baseline; justify-content:center; gap:3px; margin-top:5px;
    color:#fff; font-weight:900; text-shadow:0 2px 0 rgba(81,25,0,.35);
  }
  .wheel-pool strong{
    color:#ffe45f; font-size:28px; line-height:.95; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  }
  .wheel-buff-row{
    display:flex; flex-wrap:wrap; justify-content:center; gap:3px; margin-top:5px; max-width:108px;
  }
  .wheel-buff{
    padding:2px 6px; border-radius:999px; font-size:9px; font-weight:900; line-height:1.2;
    color:#fff; background:linear-gradient(180deg,#ff5e5e,#d8261f);
    box-shadow:0 2px 0 rgba(114,22,16,.6);
  }
  .wheel-progress-mini{
    width:132px; padding:10px; border-radius:14px;
    background:rgba(0,0,0,.28); border:1px solid rgba(245,197,66,.24);
    box-shadow:inset 0 0 14px rgba(245,197,66,.06);
  }
  @media (max-width:430px){
    .wheel-progress-mini{ width:100%; max-width:240px; margin:12px auto 0; }
  }
  .draw-card{
    min-height:76px; border-radius:12px; padding:10px;
    background:linear-gradient(160deg,rgba(251,191,36,.18),rgba(220,38,38,.12));
    border:1px solid rgba(245,197,66,.3);
    box-shadow:0 8px 18px rgba(0,0,0,.22), inset 0 0 16px rgba(245,197,66,.08);
  }
  .draw-card.empty{
    background:linear-gradient(160deg,rgba(251,191,36,.06),rgba(220,38,38,.04));
    border:1px dashed rgba(245,197,66,.2);
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    color:#a1a1aa;
    position:relative;
    overflow:hidden;
  }
  .draw-card.empty::before{
    content:'?';
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:28px; font-weight:900; color:rgba(251,191,36,.15);
    animation:cardPulse 2s ease-in-out infinite;
  }
  @keyframes cardPulse{ 0%,100%{opacity:.15;transform:translate(-50%,-50%) scale(1);} 50%{opacity:.35;transform:translate(-50%,-50%) scale(1.15);} }
  /* 宝箱风暴 */
  @keyframes chestShake{
    0%,100%{transform:translateX(0) rotate(0deg) scale(1);}
    15%{transform:translateX(-5px) rotate(-5deg) scale(1.04);}
    30%{transform:translateX(5px) rotate(5deg) scale(1.06);}
    45%{transform:translateX(-4px) rotate(-4deg) scale(1.04);}
    60%{transform:translateX(4px) rotate(4deg) scale(1.05);}
    80%{transform:translateX(0) rotate(0deg) scale(1.1);}
  }
  @keyframes chestBurst{
    0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(.85);}
    50%{opacity:1;transform:translate(-50%,-50%) scale(1.18);}
  }
  @keyframes rewardPop{
    0%{opacity:0;transform:translateY(8px) scale(.88);}
    60%{opacity:1;transform:translateY(-2px) scale(1.08);}
    100%{opacity:1;transform:translateY(0) scale(1);}
  }
  @keyframes danmakuFlow{ from{transform:translateX(100%);} to{transform:translateX(-120%);} }
  .treasure-chest{ position:relative; display:inline-block; filter:drop-shadow(0 0 20px rgba(245,197,66,.28)); }
  .treasure-chest.opening{ animation:chestShake .8s ease-in-out both; }
  .treasure-chest.opening::after{
    content:''; position:absolute; left:50%; top:50%; width:96px; height:96px;
    border-radius:999px; background:radial-gradient(circle,rgba(255,245,180,.55),rgba(245,197,66,.18) 42%,transparent 70%);
    animation:chestBurst .8s ease-in-out both; z-index:-1;
  }
  .reward-pop{ animation:rewardPop .36s ease-out both; }
  .treasure-stage{ position:relative; overflow:hidden; }
  .danmaku-float{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .danmaku-item{
    position:absolute; white-space:nowrap; font-size:11px; color:#fde68a;
    background:rgba(0,0,0,.34); border:1px solid rgba(245,197,66,.18);
    border-radius:999px; padding:3px 9px;
    animation:danmakuFlow 10s linear infinite;
  }
  /* 排行滚动 */
  .marquee{ display:flex; gap:48px; animation:marquee 30s linear infinite; white-space:nowrap; }
  @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  /* 滑动条 */
  .scroll-hide::-webkit-scrollbar{ display:none; }
  .scroll-hide{ scrollbar-width:none; }
  /* 飘金币 */
  .coin{ position:fixed; left:50%; top:30%; font-size:24px; pointer-events:none; z-index:99;
    animation:coinUp 1.4s ease-out forwards; }
  @keyframes coinUp{ 0%{opacity:0; transform:translate(-50%, 20px) scale(.5);}
                     20%{opacity:1; transform:translate(-50%, 0) scale(1.2);}
                     100%{opacity:0; transform:translate(-50%, -120px) scale(1);} }
  .toast{ position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:rgba(10,10,10,.92); border:1px solid rgba(245,197,66,.35);
    color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; z-index:100;
    box-shadow:0 4px 16px rgba(0,0,0,.6); }
  /* 水印 */
  .watermark{
    position:fixed; bottom:6px; left:50%; transform:translateX(-50%);
    z-index:200; pointer-events:none; opacity:.55;
    font-size:10px; color:#999; letter-spacing:.1em;
    background:rgba(0,0,0,.5); padding:2px 10px; border-radius:99px;
    border:1px solid rgba(245,197,66,.2);
  }
  /* 卡片 */
  .card{
    background:linear-gradient(160deg, rgba(255,255,255,.04), rgba(245,197,66,.04));
    border:1px solid rgba(245,197,66,.18);
    border-radius:18px;
  }
  .card-locked{ background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); opacity:.55; }
  .stripe-warn{
    background:repeating-linear-gradient(45deg,#facc15 0 12px,#000 12px 24px);
    height:6px;
  }
  /* 红包 */
  .redpack{
    background:linear-gradient(180deg,#dc2626,#7f1d1d);
    color:#ffe4a3; border-radius:14px;
    box-shadow:inset 0 0 0 2px #fbbf24, 0 8px 20px rgba(239,68,68,.4);
  }
  /* 排名条 */
  /* 高风险投资 K 线 */
  .kline-panel{
    background:linear-gradient(180deg,rgba(9,12,18,.92),rgba(10,10,10,.96));
    border:1px solid rgba(245,197,66,.18);
    border-radius:18px;
    overflow:hidden;
    box-shadow:inset 0 0 24px rgba(245,197,66,.04);
  }
  .kline-svg{ width:100%; height:210px; display:block; }
  .ticker-strip{
    display:flex; gap:8px; overflow:hidden; white-space:nowrap;
    border-top:1px solid rgba(255,255,255,.06);
    background:rgba(0,0,0,.28);
  }
  .ticker-strip span{ min-width:max-content; animation:marquee 22s linear infinite; }
</style>
</head>
<body class="arcade-bg">
<div id="app"></div>
<div id="customModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;padding:20px;"></div>
<div id="customToast" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(10,10,10,0.95);border:1px solid rgba(245,197,66,0.4);color:#fff;padding:12px 20px;border-radius:16px;font-size:14px;z-index:10000;box-shadow:0 8px 32px rgba(0,0,0,0.6);max-width:320px;text-align:center;"></div>
<div class="watermark">模拟教学 · 无真实资金交易 · 不涉及真实支付/赌博/投资</div>

<script>
"use strict";

// ============================================================================
//  上当模拟器 · 主程序
// ============================================================================

window.FG_API_BASE = window.FG_API_BASE || '';
// GitHub Pages cannot run /api routes. Leave empty for the built-in static fallback,
// or set window.FG_API_BASE in config.js to use a remote API, e.g. Supabase Edge Function.
const API_BASE = String(window.FG_API_BASE || '').replace(/\/$/, '');
const LOCAL_HOSTS = ['localhost', '127.0.0.1', '::1'];
let forceStaticApi = !API_BASE && (location.protocol === 'file:' || !LOCAL_HOSTS.includes(location.hostname));
const INITIAL_BALANCE = 10000;
const $ = (id) => document.getElementById(id);
const fmt = (n) => {
  if (n == null || isNaN(n)) return '¥0';
  const sign = n < 0 ? '-' : '';
  return sign + '¥' + Math.abs(n|0).toLocaleString('zh-CN');
};
const escapeHtml = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const escapeAttr = escapeHtml;

// ---------- GitHub Pages / 静态托管降级 API ----------
const STATIC_DB_KEY = 'fg_static_api_v1';
const STATIC_NICKS = ['冷静玩家', '反诈同学', '清醒挑战者', '稳住选手', '认真核验员', '不点链接人', '谨慎观察员'];

function nowIso() {
  return new Date().toISOString();
}

function randomId(prefix) {
  if (window.crypto && crypto.getRandomValues) {
    const bytes = new Uint8Array(8);
    crypto.getRandomValues(bytes);
    return prefix + Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  return prefix + Math.random().toString(36).slice(2, 12);
}

function staticNick(s) {
  const v = String(s || '').trim().slice(0, 20);
  if (v) return v;
  return STATIC_NICKS[Math.floor(Math.random() * STATIC_NICKS.length)] + Math.floor(Math.random() * 99);
}

function staticDb() {
  try {
    const raw = localStorage.getItem(STATIC_DB_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      parsed.sessions = Array.isArray(parsed.sessions) ? parsed.sessions : [];
      parsed.levelResults = Array.isArray(parsed.levelResults) ? parsed.levelResults : [];
      parsed.events = Array.isArray(parsed.events) ? parsed.events : [];
      parsed.visits = Array.isArray(parsed.visits) ? parsed.visits : [];
      parsed.levelPlays = Array.isArray(parsed.levelPlays) ? parsed.levelPlays : [];
      return parsed;
    }
  } catch(e) {}
  return { sessions: [], levelResults: [], events: [], visits: [], levelPlays: [] };
}

function saveStaticDb(db) {
  try {
    db.sessions = (db.sessions || []).slice(-200);
    db.levelResults = (db.levelResults || []).slice(-1000);
    db.events = (db.events || []).slice(-1500);
    db.visits = (db.visits || []).slice(-5000);
    db.levelPlays = (db.levelPlays || []).slice(-5000);
    localStorage.setItem(STATIC_DB_KEY, JSON.stringify(db));
  } catch(e) {}
}

function findStaticSession(db, sessionId) {
  return db.sessions.find(s => s.session_id === sessionId);
}

function staticStats(db) {
  const byLevel = {};
  (db.levelPlays || []).forEach(r => {
    const id = Number(r.level_id);
    if (!byLevel[id]) byLevel[id] = { level_id:id, participants:0 };
    byLevel[id].participants++;
  });
  const today = new Date().toLocaleDateString('en-CA');
  const levels = Object.values(byLevel).sort((a,b) => a.level_id - b.level_id);
  return {
    ok:true,
    localOnly:true,
    online:1,
    totalVisits:(db.visits || []).length,
    todayVisits:(db.visits || []).filter(v => v.visit_date === today).length,
    levels
  };
}

async function staticApi(path, method = 'GET', body = null) {
  const db = staticDb();
  const route = String(path || '').replace(/\?.*$/, '');
  const data = body || {};

  if (route === '/api/visit' && method === 'POST') {
    const visitorId = data.visitorId || getVisitorId();
    if (data.eventType !== 'heartbeat') {
      db.visits.push({ visitor_id:visitorId, visit_date:new Date().toLocaleDateString('en-CA'), visited_at:nowIso() });
    }
    saveStaticDb(db);
    return staticStats(db);
  }

  if (route === '/api/start' && method === 'POST') {
    const sessionId = randomId('local_');
    const nickname = staticNick(data.nickname);
    const row = {
      session_id:sessionId, nickname, balance:INITIAL_BALANCE, debt:0,
      completed_count:0, scam_count:0, recovery_used_count:0,
      total_recovered:0, total_earned:0, total_lost:0,
      created_at:nowIso(), updated_at:nowIso()
    };
    db.sessions.push(row);
    saveStaticDb(db);
    return { ok:true, sessionId, nickname, balance:INITIAL_BALANCE, debt:0, localOnly:true };
  }

  if (route.startsWith('/api/state/')) {
    const sessionId = decodeURIComponent(route.split('/').pop());
    const session = findStaticSession(db, sessionId);
    if (!session) return { ok:false, error:'not_found' };
    return {
      ok:true,
      localOnly:true,
      session,
      levels:db.levelResults.filter(r => r.session_id === sessionId),
      events:db.events.filter(e => e.session_id === sessionId).slice(-500)
    };
  }

  if (route === '/api/event' && method === 'POST') {
    const session = findStaticSession(db, data.sessionId);
    if (!session) return { ok:false, error:'no_session' };
    const amountChange = Number(data.amountChange || 0);
    session.balance = Number(session.balance || 0) + amountChange;
    if (amountChange > 0) session.total_earned = Number(session.total_earned || 0) + amountChange;
    if (amountChange < 0) session.total_lost = Number(session.total_lost || 0) - amountChange;
    if (data.trapCode) session.scam_count = Number(session.scam_count || 0) + 1;
    session.updated_at = nowIso();
    db.events.push({
      session_id:data.sessionId,
      level_id:data.levelId == null ? null : String(data.levelId),
      event_type:data.eventType || 'generic',
      trap_code:data.trapCode || null,
      trap_name:data.trapName || null,
      tactic:data.tactic || null,
      amount_change:amountChange,
      severity:Number(data.severity || 1),
      note:data.note || null,
      created_at:nowIso()
    });
    saveStaticDb(db);
    return { ok:true, balance:session.balance, debt:session.debt || 0, localOnly:true };
  }

  if (route === '/api/balance' && method === 'POST') {
    const session = findStaticSession(db, data.sessionId);
    if (!session) return { ok:false, error:'no_session' };
    if (Number.isFinite(data.balance)) session.balance = Number(data.balance);
    if (Number.isFinite(data.debt)) session.debt = Number(data.debt);
    session.recovery_used_count = Number(session.recovery_used_count || 0) + Number(data.recoveryDelta || 0);
    session.total_recovered = Number(session.total_recovered || 0) + Number(data.recoveredAmount || 0);
    session.updated_at = nowIso();
    saveStaticDb(db);
    return { ok:true, localOnly:true };
  }

  if (route === '/api/complete-level' && method === 'POST') {
    const session = findStaticSession(db, data.sessionId);
    if (!session) return { ok:false, error:'no_session' };
    const startBalance = Number(data.startBalance || 0);
    const endBalance = Number(data.endBalance || 0);
    db.levelResults.push({
      session_id:data.sessionId,
      level_id:Number(data.levelId || 0),
      start_balance:startBalance,
      end_balance:endBalance,
      delta:endBalance - startBalance,
      is_scammed:data.isScammed ? 1 : 0,
      trap_count:Number(data.trapCount || 0),
      main_tactic:data.mainTactic || null,
      created_at:nowIso()
    });
    session.completed_count = Number(session.completed_count || 0) + 1;
    session.updated_at = nowIso();
    saveStaticDb(db);
    return { ok:true, localOnly:true };
  }

  if (route === '/api/level-play' && method === 'POST') {
    db.levelPlays.push({
      visitor_id:data.visitorId || getVisitorId(),
      session_id:data.sessionId || null,
      level_id:Number(data.levelId || 0),
      played_at:nowIso(),
      play_date:new Date().toLocaleDateString('en-CA')
    });
    saveStaticDb(db);
    return staticStats(db);
  }

  if (route === '/api/stats') return staticStats(db);
  if (route === '/api/screen') return staticStats(db);
  return { ok:false, error:'static_route_not_found', localOnly:true };
}

// ---------- 本地持久化 ----------
function saveLocal() {
  try {
    updatePersonalBest();
    const minimal = {
      sessionId: state.sessionId, nickname: state.nickname,
      balance: state.balance, debt: state.debt,
      completedLevels: state.completedLevels,
      levelResults: state.levelResults,
      recoveryUsedCount: state.recoveryUsedCount,
      totalRecovered: state.totalRecovered,
      totalEarned: state.totalEarned, totalLost: state.totalLost,
      traps: state.traps, transactions: state.transactions.slice(-200),
      startedAt: state.startedAt
    };
    localStorage.setItem('fg_state', JSON.stringify(minimal));
  } catch(e){}
}
function loadLocal() {
  try {
    const s = localStorage.getItem('fg_state');
    if (!s) return null;
    return JSON.parse(s);
  } catch(e) { return null; }
}

function completedCount() {
  return LEVELS.filter(L => state.completedLevels[L.id]).length;
}

function loadPersonalBest() {
  try {
    const raw = localStorage.getItem('fg_personal_best');
    if (!raw) return null;
    const best = JSON.parse(raw);
    if (!Number.isFinite(best.net)) return null;
    return best;
  } catch(e) {
    return null;
  }
}

function savePersonalBest(best) {
  state.personalBest = best;
  try {
    localStorage.setItem('fg_personal_best', JSON.stringify(best));
  } catch(e) {}
}

function updatePersonalBest() {
  const net = (state.balance || 0) - (state.debt || 0);
  const completed = completedCount();
  const current = {
    net,
    balance:state.balance || 0,
    debt:state.debt || 0,
    completed,
    nickname:state.nickname || '匿名玩家',
    at:Date.now()
  };
  const best = state.personalBest || loadPersonalBest();
  const shouldUpdate = !best || net > best.net || (net === best.net && completed > (best.completed || 0));
  if (shouldUpdate) savePersonalBest(current);
  else state.personalBest = best;
  return state.personalBest || current;
}

// ---------- API ----------
async function api(path, method = 'GET', body = null) {
  if (forceStaticApi) return staticApi(path, method, body);
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API_BASE + path, opts);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const type = r.headers.get('content-type') || '';
    if (!type.includes('application/json')) throw new Error('Non-JSON response');
    return await r.json();
  } catch (e) {
    console.warn('[api]', path, e);
    if (!API_BASE) {
      forceStaticApi = true;
      return staticApi(path, method, body);
    }
    return { ok: false, error: 'network' };
  }
}

// ---------- 钱包/陷阱 ----------
function changeMoney(amount, reason, trapCode = null, floatText = null) {
  if (!amount) return;
  state.balance += amount;
  if (amount > 0) state.totalEarned += amount;
  else state.totalLost += -amount;
  state.transactions.push({
    levelId: state.currentLevel, amount, reason: reason || '', balanceAfter: state.balance, ts: Date.now()
  });
  showCoin(amount, floatText);
  if (state.sessionId) {
    api('/api/event', 'POST', {
      sessionId: state.sessionId,
      levelId: state.currentLevel || null,
      eventType: amount > 0 ? 'gain' : 'loss',
      trapCode, amountChange: amount, note: reason || '',
      severity: trapCode ? 2 : 1
    });
  }
  saveLocal();
}

function recordTrap(t) {
  // {levelId, trapCode, trapName, tactic, severity, amountChange, explanation}
  state.traps.push({ ...t, ts: Date.now() });
  state.levelTraps++;
  if (!state.levelMainTactic) state.levelMainTactic = t.tactic;
  if (state.sessionId) {
    api('/api/event', 'POST', {
      sessionId: state.sessionId,
      levelId: t.levelId || state.currentLevel || null,
      eventType: 'trap',
      trapCode: t.trapCode, trapName: t.trapName, tactic: t.tactic,
      amountChange: t.amountChange || 0, severity: t.severity || 2,
      note: t.explanation || ''
    });
    if (t.amountChange) {
      state.balance += t.amountChange;
      if (t.amountChange > 0) state.totalEarned += t.amountChange;
      else state.totalLost += -t.amountChange;
      state.transactions.push({
        levelId: t.levelId || state.currentLevel, amount: t.amountChange,
        reason: t.trapName || t.tactic || '', balanceAfter: state.balance, ts: Date.now()
      });
      showCoin(t.amountChange);
    }
  }
  saveLocal();
}

function modifyDebt(delta) {
  state.debt += delta;
  if (state.sessionId) {
    api('/api/balance', 'POST', { sessionId: state.sessionId, balance: state.balance, debt: state.debt });
  }
  saveLocal();
}

function recordRecovery(amount) {
  state.recoveryUsedCount++;
  state.totalRecovered += Math.max(0, amount|0);
  if (state.sessionId) {
    api('/api/balance', 'POST', {
      sessionId: state.sessionId, balance: state.balance, debt: state.debt,
      recoveryDelta: 1, recoveredAmount: Math.max(0, amount|0)
    });
  }
  saveLocal();
}

async function completeLevel(levelId, mainTactic) {
  const startBalance = state.levelStartBalance;
  const endBalance = state.balance;
  const isScammed = state.levelTraps > 0 && (endBalance - startBalance) < 0 ? 1 : 0;
  state.completedLevels[levelId] = true;
  state.levelResults[levelId] = {
    levelId,
    startBalance, endBalance,
    delta: endBalance - startBalance,
    isScammed,
    trapCount: state.levelTraps,
    mainTactic: mainTactic || state.levelMainTactic,
    ts: Date.now()
  };
  state.levelLastResult = state.levelResults[levelId];
  saveLocal();
  setView('result');
  if (state.sessionId) {
    api('/api/complete-level', 'POST', {
      sessionId: state.sessionId,
      levelId, startBalance, endBalance,
      isScammed, trapCount: state.levelTraps,
      mainTactic: mainTactic || state.levelMainTactic
    });
  }
}

  return `<button type="button" data-action="${escapeAttr(onclick)}" class="${cls} w-full py-4 my-2">${escapeHtml(text)}</button>`;

document.addEventListener('click', (event) => {
  const button = event.target.closest('[data-action]');
  if (!button) return;
  event.preventDefault();
  const action = button.getAttribute('data-action');
  if (!action) return;
  try {
    runButtonAction(action);
  } catch (err) {
    console.error('[button action failed]', action, err);
    toast('按钮执行失败，请刷新后重试');
  }
});

function runButtonAction(action) {
  const match = String(action).trim().match(/^([A-Za-z_$][\w$]*)\((.*)\)$/s);
  if (!match) throw new Error('Invalid action: ' + action);
  const fn = window[match[1]];
  if (typeof fn !== 'function') throw new Error('Unknown action: ' + match[1]);
  fn(...parseActionArgs(match[2]));
}

function parseActionArgs(source) {
  const text = String(source || '').trim();
  if (!text) return [];
  const args = [];
  let current = '';
  let quote = '';
  let escaped = false;
  for (const ch of text) {
    if (escaped) {
      current += ch;
      escaped = false;
      continue;
    }
    if (ch === '\\') {
      current += ch;
      escaped = true;
      continue;
    }
    if (quote) {
      current += ch;
      if (ch === quote) quote = '';
      continue;
    }
    if (ch === '"' || ch === "'") {
      current += ch;
      quote = ch;
      continue;
    }
    if (ch === ',') {
      args.push(parseActionArg(current));
      current = '';
      continue;
    }
    current += ch;
  }
  if (quote) throw new Error('Unclosed quote in action args');
  args.push(parseActionArg(current));
  return args;
}

function parseActionArg(value) {
  const text = String(value || '').trim();
  if (!text) return undefined;
  const first = text[0];
  const last = text[text.length - 1];
  if ((first === '"' && last === '"') || (first === "'" && last === "'")) {
    return text.slice(1, -1).replace(/\\(["'\\])/g, '$1');
  }
  if (/^-?\d+(\.\d+)?$/.test(text)) return Number(text);
  if (text === 'true') return true;
  if (text === 'false') return false;
  if (text === 'null') return null;
  throw new Error('Unsupported action arg: ' + text);
}

// PDD式进度显示：根据阶段动态决定小数位数
function level1FormatProgress(ld) {
  const p = ld.progress;
  if (p < 90) return p.toFixed(0);
  if (p < 99) return p.toFixed(1);
  if (p < 99.9) return p.toFixed(2);
  if (p < 99.99) return p.toFixed(3);
  if (p < 99.999) return p.toFixed(4);
  return p.toFixed(5);
}

function level1FormatGap(ld) {
  const gap = 100 - ld.progress;
  if (gap >= 10) return gap.toFixed(0);
  if (gap >= 1) return gap.toFixed(1);
  if (gap >= 0.1) return gap.toFixed(2);
  if (gap >= 0.01) return gap.toFixed(3);
  if (gap >= 0.001) return gap.toFixed(4);
  return gap.toFixed(5);
}

function level1SpinStage(spinNo) {
  if (spinNo <= 3) return { key:'free', cost:0, title:'新人免费抽奖 · 系统提示回本率暴增' };
  if (spinNo <= 5) return { key:'one', cost:1, title:'提现最终阶段 · 仅需 ¥1 激活通道' };
  if (spinNo <= 10) return { key:'five', cost:5, title:'大奖锁定阶段 · ¥5 补足最后进度' };
  if (spinNo <= 15) return { key:'ten', cost:10, title:'最终审核阶段 · ¥10 完成提现验证' };
  return { key:'done', cost:null, title:'提现资格已生成 · 请立即验证' };
}

function level1WheelPrizes() {
  return [
    { icon:'¥88', label:'金额+88', type:'cash', amount:88 },
    { icon:'🍀', label:'幸运+5', type:'luck', luck:5 },
    { icon:'x2', label:'下抽翻倍', type:'double' },
    { icon:'免', label:'免费一次', type:'free' },
    { icon:'¥188', label:'金额+188', type:'cash', amount:188 },
    { icon:'🍀', label:'幸运+10', type:'luck', luck:10 },
    { icon:'x2', label:'下抽翻倍', type:'double' },
    { icon:'¥288', label:'金额+288', type:'cash', amount:288 }
  ];
}

function level1SpinButtonText(ld) {
  const spinNo = ld.totalSpins + 1;
  const stage = level1SpinStage(spinNo);
  if (stage.cost === 0) return `🎁 免费抽奖 ${spinNo}/3`;
  if ((ld.extraFreeDraws || 0) > 0) return `🎁 免费抽一次 · 原价 ¥${stage.cost}`;
  return `🎡 ¥${stage.cost} 抽奖 · ${spinNo}/15`;
}

function level1LuckyValue(ld) {
  const value = 99 + Math.floor((ld.totalSpins || 0) * 1.4) + (ld.bonusLuck || 0);
  return value.toLocaleString();
}

function level1StageHype(ld) {
  const spinNo = ld.totalSpins + 1;
  if (spinNo <= 3) return '系统已为你保留新人资格，免费抽完 3 次即可进入提现最终阶段。';
  if (spinNo <= 5) return '你已进入提现最终阶段，页面提示只差一次小额激活，¥1 抽奖后进度将明显推进。';
  if (spinNo <= 10) return '奖金池已锁定，系统正在补齐小数点后的提现进度；放弃会清空当前幸运值。';
  if (spinNo <= 15) return '最后审核倒计时：完成本阶段即可生成提现按钮，已有大量用户在此阶段成功提现。';
  return '提现按钮已生成，但平台会继续设置流水、保证金和风控验证。';
}

function level1VisibleProgressStep(p) {
  if (p < 90) return 0.8;
  if (p < 99) return 0.12;
  if (p < 99.9) return 0.018;
  if (p < 99.99) return 0.002;
  if (p < 99.999) return 0.0002;
  return 0.00002;
}

function level1SetProgressAtLeast(ld, candidate, cap = 99.9999) {
  const p = ld.progress || 0;
  const visibleNext = p + level1VisibleProgressStep(p);
  ld.progress = Math.min(cap, Math.max(candidate, visibleNext));
}

function level1ApplyStageProgress(ld, spinNo) {
  const p = ld.progress || 0;
  if (spinNo === 1) {
    level1SetProgressAtLeast(ld, 62 + Math.random() * 5);
    ld.claimable = 388;
    return;
  }
  if (spinNo === 2) { level1SetProgressAtLeast(ld, 84 + Math.random() * 4); return; }
  if (spinNo === 3) { level1SetProgressAtLeast(ld, 95.6 + Math.random() * 1.2); return; }
  if (spinNo === 4) { level1SetProgressAtLeast(ld, 98.4 + Math.random() * 0.35); return; }
  if (spinNo === 5) { level1SetProgressAtLeast(ld, 99.08 + Math.random() * 0.22); return; }
  if (spinNo <= 10) {
    const targets = [99.43, 99.62, 99.78, 99.88, 99.94];
    level1SetProgressAtLeast(ld, targets[spinNo - 6] + Math.random() * 0.025);
    return;
  }
  if (spinNo <= 15) {
    const targets = [99.972, 99.986, 99.993, 99.997, 99.9992];
    level1SetProgressAtLeast(ld, targets[spinNo - 11] + Math.random() * 0.0006);
    return;
  }
  level1SetProgressAtLeast(ld, p + 0.00005);
}

function level1ApplyWheelPrize(ld, prize) {
  if (!prize) return '';
  ld.lastWheelPrize = `${prize.icon} ${prize.label}`;
  if (prize.type === 'cash') {
    ld.claimable += prize.amount;
    return `金额+¥${prize.amount}`;
  }
  if (prize.type === 'luck') {
    ld.bonusLuck += prize.luck;
    return `幸运值+${prize.luck}`;
  }
  if (prize.type === 'double') {
    ld.nextDouble = true;
    return '下抽翻倍已激活';
  }
  if (prize.type === 'free') {
    ld.extraFreeDraws += 1;
    return '获得免费抽一次';
  }
  return '';
}

function level1RecordStageTrap(ld, stage, spinNo) {
  ld.stageTraps = ld.stageTraps || {};
  if (stage.cost <= 0 || ld.stageTraps[stage.key]) return;
  ld.stageTraps[stage.key] = true;
  recordTrap({ levelId:1, trapCode:'L1_STAGE_PAY', trapName:`${stage.cost}元阶段抽奖`, tactic:'阶梯充值', severity:2,
    explanation:`平台先给免费进度，再把抽奖费从 ¥${stage.cost} 做成看似很小的门槛，让你觉得离提现只差最后一步。` });
}

// PDD式进度跳跃逻辑
function level1ApplySpin(mode, chargedCost = 0, prizeIndex = null, usedRewardFreeDraw = false) {
  const ld = state.levelData;
  const spinNo = ld.totalSpins + 1;
  const hadDouble = mode === 'draw' && !!ld.nextDouble;
  if (hadDouble) ld.nextDouble = false;
  ld.totalSpins++;

  if (mode === 'draw') {
    const beforeClaimable = ld.claimable || 0;
    level1ApplyStageProgress(ld, spinNo);
    if (ld.claimable <= 0) ld.claimable = 388;
    ld.claimable += Math.floor(8 + Math.random() * 26);
    const prize = level1WheelPrizes()[prizeIndex];
    const prizeText = level1ApplyWheelPrize(ld, prize);
    if (hadDouble) {
      const claimGain = Math.max(0, (ld.claimable || 0) - beforeClaimable);
      ld.claimable += claimGain;
    }
    if (chargedCost > 0) ld.totalPaid += chargedCost;
    const gapStr = level1FormatGap(ld);
    const extraText = [
      prizeText,
      hadDouble ? '本抽金额已翻倍' : '',
      usedRewardFreeDraw ? '奖励免单' : ''
    ].filter(Boolean).join(' · ');
    if (spinNo <= 3) toast(`🎉 ${extraText || '免费抽中奖池碎片'}！还差 ${gapStr}%`);
    else if (spinNo <= 5) toast(`${extraText || '提现通道已激活'}，还差 ${gapStr}%`);
    else if (spinNo <= 10) toast(`${extraText || '大奖已锁定'}，还差 ${gapStr}%`);
    else toast(`${extraText || '最终审核推进中'}，还差 ${gapStr}%`);
  } else if (mode === 'free') {
    changeMoney(0, '首转必中（仅计入抽奖账户）');
    ld.progress = 60 + Math.random() * 10;
    ld.claimable = 388;
    toast('🎉 恭喜获得 ¥388 现金！继续转动即可提现');
  } else if (mode === 'boost' || mode === 'premium' || mode === 'tier') {
    const p = ld.progress;
    let jump;
    if (p < 80) {
      jump = 8 + Math.random() * 12;
    } else if (p < 95) {
      jump = 2 + Math.random() * 5;
    } else if (p < 99) {
      jump = 0.5 + Math.random() * 2;
    } else if (p < 99.9) {
      jump = 0.05 + Math.random() * 0.15;
      if (mode === 'tier') jump *= 1.5;
      if (mode === 'premium') jump *= 1.2;
    } else if (p < 99.99) {
      jump = 0.005 + Math.random() * 0.015;
      if (mode === 'tier') jump *= 1.5;
      if (mode === 'premium') jump *= 1.2;
    } else if (p < 99.999) {
      jump = 0.0005 + Math.random() * 0.0015;
      if (mode === 'tier') jump *= 1.5;
      if (mode === 'premium') jump *= 1.2;
    } else {
      jump = 0.00005 + Math.random() * 0.00015;
      if (mode === 'tier') jump *= 1.5;
      if (mode === 'premium') jump *= 1.2;
    }
    ld.progress = Math.min(99.9999, p + jump);
    ld.claimable += Math.floor(5 + Math.random() * 30);

    const gapStr = level1FormatGap(ld);
    if (mode === 'premium') {
      toast(`加速成功！还差 ${gapStr}%`);
    } else if (mode === 'tier') {
      toast(`极速补齐中…还差 ${gapStr}%`);
    } else {
      toast(`+${level1FormatProgress(ld)}%！还差 ${gapStr}%`);
    }
  }

  if (ld.progress >= 99.99 && !ld.shownTinyGap) {
    ld.shownTinyGap = true;
    recordTrap({ levelId:1, trapCode:'L1_NEAR', trapName:'差一点中奖', tactic:'差点中奖', severity:1,
      explanation:'进度卡在 99.99%，每次只前进 0.00x%——这就是"无限逼近"的套路，让你觉得下一把就行了。' });
  }
  render();
};

window.level1Spin = function(mode = 'draw') {
  if (window._level1Spinning) return;
  const ld = state.levelData;
  const spinNo = ld.totalSpins + 1;
  const stage = mode === 'draw' ? level1SpinStage(spinNo) : { cost:0, key:'legacy' };
  if (mode === 'draw' && stage.cost == null) return level1Withdraw();
  window._level1Spinning = true;
  let chargedCost = stage.cost || 0;
  let usedRewardFreeDraw = false;
  if (mode === 'draw' && chargedCost > 0 && (ld.extraFreeDraws || 0) > 0) {
    ld.extraFreeDraws--;
    chargedCost = 0;
    usedRewardFreeDraw = true;
  }
  if (mode === 'draw' && chargedCost > 0) {
    changeMoney(-chargedCost, `第${spinNo}次抽奖费用`, 'L1_STAGE_PAY');
    level1RecordStageTrap(ld, stage, spinNo);
  }
  const wheel = document.getElementById('level1Wheel');
  const extraTurns = 360 * (4 + Math.floor(Math.random() * 2));
  const prizeIndex = Math.floor(Math.random() * level1WheelPrizes().length);
  const targetAngle = 360 - (prizeIndex * 45 + 22.5);
  const currentAngle = ((ld.angle || 0) % 360 + 360) % 360;
  const deltaToPrize = (targetAngle - currentAngle + 360) % 360;
  ld.angle = (ld.angle || 0) + extraTurns + deltaToPrize;
  if (wheel) wheel.style.transform = `rotate(${ld.angle}deg)`;
  setTimeout(() => {
    level1ApplySpin(mode, chargedCost, prizeIndex, usedRewardFreeDraw);
    window._level1Spinning = false;
  }, 1750);
};

window.level1Double = async function() {
  const ld = state.levelData;
  if (window._level1Spinning) return;
  const cost = Math.floor(30 * Math.pow(1.5, ld.doubleAttempts));

  changeMoney(-cost, `奖池翻倍至${newMulti}x`, 'L1_DOUBLE');
  ld.multiplier = newMulti;
  ld.doubleAttempts++;

function level3DrawPrize(type, openIndex, pity, luck, inLegendPool) {
  const cost = type === 'premium' ? 299 : 99;
  if (openIndex === 1) {
    const firstAmounts = [66, 88, 98, 108, 128];
    const amount = firstAmounts[Math.floor(Math.random() * firstAmounts.length)];
    return { amount, label:'首箱福利', note:'页面宣称 80% 回本率', rare:false, luck:type === 'premium' ? 26 : 18, voucher:type === 'premium' ? 38 : 10 };
  }
  if (inLegendPool) {
    const roll = Math.random();
    if (roll < 0.008) return { amount:688 + Math.floor(Math.random() * 500), label:'传说池暴击', note:'已触发传说池现金奖励', rare:true, luck:0, voucher:0, legendShard:0, reserveTicket:0 };
    if (roll < 0.18) return { amount:168 + Math.floor(Math.random() * 36), label:'传说碎片 x2', note:'距离传说大奖只差碎片合成', rare:false, luck:10, voucher:28, legendShard:2, reserveTicket:0 };
    if (roll < 0.70) return { amount:88 + Math.floor(Math.random() * 70), label:'传说碎片 x1', note:'已进入传说池，碎片会保留', rare:false, luck:18, voucher:48, legendShard:1, reserveTicket:0 };
    return { amount:0, label:'大奖预约券', note:'预约成功，需继续开箱激活大奖资格', rare:false, luck:26, voucher:68, legendShard:1, reserveTicket:1 };
  }
  const roll = Math.random();
  if (type === 'premium') {
    if (roll < 0.01) return { amount:688 + Math.floor(Math.random() * 700), label:'稀有暴击', note:'系统提示：大奖池正在升温', rare:true, luck:0, voucher:0 };
    if (roll < 0.08) return { amount:188 + Math.floor(Math.random() * 20), label:'差点小赚', note:'仅差一点触发翻倍池', rare:false, luck:18, voucher:28 };
    if (roll < 0.68) return { amount:98 + Math.floor(Math.random() * 90), label:'差点回本', note:'进度已推进，建议继续开高级箱', rare:false, luck:20, voucher:48 };
    if (roll < 0.93) return { amount:28 + Math.floor(Math.random() * 70), label:'高级碎片', note:'碎片已累计，保底更近了', rare:false, luck:28, voucher:68 };
    return { amount:0, label:'空箱补偿', note:'获得大量幸运值，下次概率提升', rare:false, luck:30, voucher:88 };
  }
  if (roll < 0.05) return { amount:388 + Math.floor(Math.random() * 220), label:'小暴击', note:'普通箱也能出货', rare:false, luck:5, voucher:0 };
  if (roll < 0.23) return { amount:108 + Math.floor(Math.random() * 70), label:'回本附近', note:'差一点点就赚更多', rare:false, luck:8, voucher:8 };
  if (roll < 0.82) return { amount:18 + Math.floor(Math.random() * 68), label:'碎片奖励', note:'累计碎片可提升保底', rare:false, luck:10, voucher:18 };
  return { amount:0, label:'空箱补偿', note:'幸运值提升，下一箱更接近大奖', rare:false, luck:14, voucher:28 };
}

window.level3Open = async function(t) {
  if (window._level3Opening) return;
  const ld = state.levelData;
  window._level3Opening = true;
  ld.opening = true;
  render();
  await new Promise(r => setTimeout(r, 820));

  ld.opens++;
  const baseCost = t==='premium'?299:99;
  const inLegendPool = t === 'premium' && (ld.legendTicket || 0) > 0;
  const usedVoucher = t === 'premium' ? (ld.voucher || 0) : 0;
  const discount = t === 'premium' ? Math.min(baseCost, usedVoucher) : 0;
  const cost = baseCost - discount;
  if (t === 'premium') ld.voucher = 0;
  if (inLegendPool) {
    ld.legendTicket = Math.max(0, (ld.legendTicket || 0) - 1);
    ld.pity = 0;
  } else {
    ld.pity = t === 'premium' ? (ld.pity || 0) + 1 : (ld.pity || 0);
  }
  changeMoney(-cost, '开箱成本');
  ld.totalBoxCost = (ld.totalBoxCost || 0) + cost;
  let prize;
  if (t === 'premium' && !inLegendPool && ld.pity >= 3) {
    prize = { amount:128, label:'保底达成', note:'获得 1 次传说池入场券，下次高级箱自动使用', rare:false, luck:12, voucher:38, legendTicket:1 };
    ld.pity = 0;
  } else {
    prize = level3DrawPrize(t, ld.opens, ld.pity, ld.luck || 0, inLegendPool);
  }
  if (ld.opens > 1 && !prize.rare) {
    const projectedNet = (ld.totalBoxReward || 0) + prize.amount - (ld.totalBoxCost || 0);
    if (projectedNet > -40) {
      const targetAmount = Math.max(0, cost - 18 - Math.floor(Math.random() * 55));
      if (prize.amount > targetAmount) {
        prize.amount = targetAmount;
        prize.label = '差点暴击';
        prize.note = '系统提示：下一箱更接近大奖';
        prize.luck = (prize.luck || 0) + 8;
        prize.voucher = (prize.voucher || 0) + 18;
      }
    }
  }
  changeMoney(prize.amount, prize.label);
  ld.totalBoxReward = (ld.totalBoxReward || 0) + prize.amount;
  ld.luck = Math.min(99, (ld.luck || 0) + (prize.luck || 0));
  ld.voucher = Math.min(188, (ld.voucher || 0) + (prize.voucher || 0));
  ld.legendTicket = Math.min(1, (ld.legendTicket || 0) + (prize.legendTicket || 0));
  ld.legendShards = Math.min(6, (ld.legendShards || 0) + (prize.legendShard || 0));
  ld.reserveTicket = Math.min(1, (ld.reserveTicket || 0) + (prize.reserveTicket || 0));
  if (prize.rare) {
    ld.legendaryRemaining = Math.max(0, (ld.legendaryRemaining || 2) - 1);
    ld.pity = 0;
    ld.legendShards = Math.max(0, Math.floor((ld.legendShards || 0) / 2));
    ld.reserveTicket = 0;
    ld.luck = Math.max(25, Math.floor((ld.luck || 0) * 0.35));
  }
  const publicAmount = prize.amount >= cost ? prize.amount : prize.amount + baseCost + (prize.voucher || 0) + Math.floor(Math.random() * 260);
  const danmakuName = ['南区阿杰','小雨同学','星辰玩家','刚下课的L','挑战学长','幸运室友'][ld.opens % 6];
  const item = { box: t === 'premium' ? '高级箱' : '普通箱', amount: prize.amount + (prize.voucher || 0), label: prize.label };
  ld.history = [item].concat(ld.history || []).slice(0, 6);
  ld.lastReward = { ...prize, danmakuName, publicAmount, usedVoucher };
  ld.danmaku = [{ name: danmakuName, amount: publicAmount }].concat(ld.danmaku || level3SeedDanmaku()).slice(0, 6);

  if (ld.opens >= 3 && t === 'premium') {
    recordTrap({ levelId:4, trapCode:'L3_FAKE_FLOOR', trapName:'保底假象', tactic:'规则黑箱', severity:2,
      explanation:'高级箱保底只给传说池入场券；传说池又给碎片和预约券，层层把现金大奖往后推。' });
    if (!ld.shownPremiumRuleAlert) {
      ld.shownPremiumRuleAlert = true;
      await customAlert('💥 保底规则更新', '保底已达成时，会优先发放“传说池入场券”。\n\n传说池奖励包含现金、传说碎片和大奖预约券；集齐碎片后仍需继续激活。');
    }
  }
  if (ld.opens === 1) toast(`首箱开出 ${fmt(prize.amount)}，幸运值+${prize.luck || 0}`);
  else if (prize.amount >= cost) toast(`🎉 开出 ${fmt(prize.amount)}，看起来赚了`);
  else if (prize.voucher) toast(`开出 ${fmt(prize.amount)} + 抵扣券 ${fmt(prize.voucher)}，差一点回本`);
  else toast(prize.amount > 0 ? `开出 ${fmt(prize.amount)}，差一点回本` : '空箱！幸运值大幅提升');
  ld.opening = false;
  window._level3Opening = false;
  render();
};

function level8Init(ld) {
  if (ld.candles) return;
  ld.units = 0;
  ld.costBasis = 0;
  ld.realized = 0;
  ld.tick = 0;
  ld.dayChange = 0;
  ld.lastTrade = '';
  ld.trapRecorded = false;
  ld.candles = [];
  let price = 86 + Math.random() * 18;
  for (let i = 0; i < 28; i++) {
    const pct = (Math.random() - 0.57) * 0.13 + (i % 9 === 0 ? (Math.random() < 0.68 ? -0.18 : 0.14) : 0);
    const candle = level8MakeCandle(price, pct);
    ld.candles.push(candle);
    price = candle.close;
  }
  ld.dayOpen = ld.candles[0].open;
  level8AdvanceMarket(ld, false);
}

function level8StartTicker() {
  if (window._level8Ticker) return;
  window._level8Ticker = setInterval(() => {
    if (state.view !== 'level' || state.currentLevel !== 8 || state.levelEnded) {
      clearInterval(window._level8Ticker);
      window._level8Ticker = null;
      return;
    }
    level8AdvanceMarket(state.levelData, true);
    render();
  }, 1000);
}

function level8AdvanceMarket(ld, noisy) {
  level8Init(ld);
  const price = level8Price(ld);
  const shock = Math.random() < 0.22;
  const downChance = shock ? (price > 130 ? 0.78 : 0.66) : (price > 130 ? 0.68 : 0.58);
  const direction = Math.random() < downChance ? -1 : 1;
  const magnitude = shock ? 0.08 + Math.random() * 0.24 : 0.012 + Math.random() * 0.068;
  const drift = price > 210 ? -0.035 : price < 24 ? 0.02 : -0.006;
  const candle = level8MakeCandle(price, direction * magnitude + drift);
  ld.candles.push(candle);
  if (ld.candles.length > 42) ld.candles.shift();
  ld.tick++;
  ld.dayChange = ld.dayOpen ? ((candle.close - ld.dayOpen) / ld.dayOpen) * 100 : 0;
  if (noisy && Math.abs((candle.close - candle.open) / candle.open) > 0.12) {
    toast(candle.close > candle.open ? '普特币急拉，盘口跳涨' : '普特币跳水，盘口砸盘');
  }
}

function level8MakeCandle(open, pct) {
  const close = Math.max(3, open * (1 + pct));
  const wick = 0.025 + Math.random() * 0.09;
  const high = Math.max(open, close) * (1 + wick * Math.random());
  const low = Math.max(1, Math.min(open, close) * (1 - wick * Math.random()));
  return { open, high, low, close, volume: Math.round(3000 + Math.random() * 18000) };
}

function level8Price(ld) {
  const candle = ld.candles && ld.candles[ld.candles.length - 1];
  return candle ? candle.close : 0;
}

function level8PositionValue(ld) {
  return Math.round((ld.units || 0) * level8Price(ld));
}

function level8Money(n) {
  return '¥' + Number(n || 0).toLocaleString('zh-CN', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function level8KlineSvg(ld) {
  const candles = (ld.candles || []).slice(-34);
  const w = 360, h = 210, pad = 18;
  const highs = candles.map(c => c.high);
  const lows = candles.map(c => c.low);
  const max = Math.max(...highs);
  const min = Math.min(...lows);
  const span = Math.max(1, max - min);
  const y = (v) => pad + (max - v) / span * (h - pad * 2);
  const step = (w - pad * 2) / Math.max(1, candles.length);
  const grid = [0,1,2,3].map(i => {
    const gy = pad + i * (h - pad * 2) / 3;
    return `<line x1="${pad}" y1="${gy.toFixed(1)}" x2="${w-pad}" y2="${gy.toFixed(1)}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;
  }).join('');
  const bars = candles.map((c, i) => {
    const x = pad + i * step + step / 2;
    const up = c.close >= c.open;
    const color = up ? '#fb7185' : '#34d399';
    const bodyY = Math.min(y(c.open), y(c.close));
    const bodyH = Math.max(2, Math.abs(y(c.open) - y(c.close)));
    const bodyW = Math.max(4, step * 0.58);
    return `<g>
      <line x1="${x.toFixed(1)}" y1="${y(c.high).toFixed(1)}" x2="${x.toFixed(1)}" y2="${y(c.low).toFixed(1)}" stroke="${color}" stroke-width="1.5"/>
      <rect x="${(x-bodyW/2).toFixed(1)}" y="${bodyY.toFixed(1)}" width="${bodyW.toFixed(1)}" height="${bodyH.toFixed(1)}" rx="1.5" fill="${up ? 'rgba(251,113,133,.86)' : 'rgba(52,211,153,.86)'}"/>
    </g>`;
  }).join('');
  const last = candles[candles.length - 1];
  const lastY = last ? y(last.close) : h / 2;
  return `<svg class="kline-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="普特币动态K线">
    <rect x="0" y="0" width="${w}" height="${h}" fill="rgba(0,0,0,.12)"/>
    ${grid}
    ${bars}
    <line x1="${pad}" y1="${lastY.toFixed(1)}" x2="${w-pad}" y2="${lastY.toFixed(1)}" stroke="rgba(245,197,66,.45)" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="${w-pad}" y="${Math.max(12,lastY-5).toFixed(1)}" text-anchor="end" fill="#f5c542" font-size="10" font-family="monospace">${level8Money(last ? last.close : 0)}</text>
  </svg>`;
}

function level8MarketTape(ld) {
  const price = level8Price(ld);
  const value = level8PositionValue(ld);
  const p = level8Money(price);
  return ` PTCN ${p}  |  波动 ${ld.dayChange>=0?'+':''}${(ld.dayChange || 0).toFixed(1)}%  |  持仓 ${fmt(value)}  |  手续费 ${(L8_FEE_RATE*100).toFixed(1)}%/次  |  ${Math.random()<0.5?'买盘追高':'卖盘砸出'}  | `;
}

window.level8Buy = function(amount) {
  const ld = state.levelData;
  level8Init(ld);
  amount = Math.floor(amount || 0);
  if (amount < 100) return toast('最低买入 ¥100');
  if (state.balance < amount) return toast('余额不足，不能买入');
  const price = level8Price(ld);
  const fee = Math.max(1, Math.round(amount * L8_FEE_RATE));
  const filled = Math.max(0, amount - fee);
  const units = filled / price;
  ld.units = (ld.units || 0) + units;
  ld.costBasis = (ld.costBasis || 0) + amount;
  ld.lastTrade = `买入 ${units.toFixed(4)} PTCN，成交 ${fmt(amount)}，手续费 ${fmt(fee)}`;
  changeMoney(-amount, `买入普特币（含 ${fmt(fee)} 手续费）`, 'L8_BUY');
  if (!ld.trapRecorded) {
    ld.trapRecorded = true;
    recordTrap({ levelId:8, trapCode:'L8_RISK_TRADE', trapName:'高波动投资', tactic:'高风险投机', severity:2,
      explanation:'高波动标的会在短时间内剧烈涨跌，频繁买卖还会被手续费持续消耗。' });
  }
  render();
};

window.level8AllIn = function() {
  const amount = Math.max(0, Math.floor(state.balance * 0.98));
  if (amount < 100) return toast('余额不足，不能满仓');
  level8Buy(amount);
};

window.level8Sell = function(ratio) {
  const ld = state.levelData;
  level8Init(ld);
  ratio = Math.max(0, Math.min(1, Number(ratio) || 0));
  if (!ld.units || ratio <= 0) return toast('当前没有持仓');
  const units = ld.units * ratio;
  const gross = units * level8Price(ld);
  const fee = Math.max(1, Math.round(gross * L8_FEE_RATE));
  const net = Math.max(0, Math.round(gross - fee));
  const costOut = (ld.costBasis || 0) * ratio;
  ld.units -= units;
  if (ld.units < 0.000001) ld.units = 0;
  ld.costBasis = Math.max(0, (ld.costBasis || 0) - costOut);

  render();
};

function renderFinalReport() {
  const completed = LEVELS.filter(L => state.completedLevels[L.id]).length;

  const best = updatePersonalBest();
  // 评分
  let score = 100;
  state.traps.forEach(t => {
    const sev = t.severity || 1;
    if (sev >= 3) score -= 15;
    else if (sev >= 2) score -= 8;
    else score -= 3;
    if (t.trapCode && t.trapCode.includes('FEE')) score -= 5;
  });
  score -= state.recoveryUsedCount * 10;
  if (state.debt > 0) score -= 20;
  if (state.balance < 0) score -= 20;
  if (completed === 10 && net > 0) score += 20;
  score = Math.max(0, Math.min(100, score));

  let level = 'S', levelLabel = '反诈王者', color = 'text-emerald-400';
  if (score < 90) { level='A'; levelLabel='高度警觉'; color='text-cyan-400'; }
  if (score < 75) { level='B'; levelLabel='基本安全'; color='text-amber-400'; }
  if (score < 55) { level='C'; levelLabel='容易上头'; color='text-orange-400'; }
  if (score < 35) { level='D'; levelLabel='高危玩家'; color='text-rose-400'; }

  // 最易击中的心理机制

  const levelDetails = LEVELS.map(L => {

    case 'menu':
      // 异步刷新统计
      loadStats().then(() => { if (state.view==='menu') $('app').innerHTML = renderMenu(); });
      html = renderMenu();
      break;
    case 'level': html = renderLevel(state.currentLevel); break;
    case 'result': html = renderLevelResult(); break;
    case 'recovery': html = renderRecoveryCenter(); break;
    case 'report': html = renderFinalReport(); break;
    case 'screen': html = renderScreen(); break;
    default: html = renderWelcome();
  }
  $('app').innerHTML = html;
}

// ============================================================================
//  初始化
// ============================================================================
async function init() {
  state.personalBest = loadPersonalBest();
  await recordVisit('pageview');
  if (window._visitTimer) clearInterval(window._visitTimer);
  window._visitTimer = setInterval(() => recordVisit('heartbeat'), 60000);

  // 大屏直达
  const params = new URLSearchParams(location.search);
  const isScreenRoute = /\/screen\/?$/.test(location.pathname) || params.get('screen') === '1' || location.hash === '#screen';
  if (isScreenRoute) {
    state.view = 'screen';
    state.nickname = '大屏';
    const r = await api('/api/screen');
    if (r && r.ok) state.stats = r;
    render();
    if (window._screenTimer) clearInterval(window._screenTimer);
    window._screenTimer = setInterval(async () => {
      const r2 = await api('/api/screen');
      if (r2 && r2.ok) { state.stats = r2; render(); }
    }, 5000);
    return;
  }

  // 加载本地状态
  const local = loadLocal();
  if (local && local.sessionId) {
    Object.assign(state, local);
    state.view = state.nickname ? 'menu' : 'welcome';
  }

  // URL 参数：?level=N 直达关卡
  const lvl = parseInt(params.get('level') || '0', 10);
  if (lvl >= 1 && lvl <= 10) {
    if (!state.sessionId) {
      // 自动创建匿名 session
      await ensureSession('');
    }
    enterLevel(lvl);
    return;
  }

  render();
}

init();
</script>
</body>
</html>
